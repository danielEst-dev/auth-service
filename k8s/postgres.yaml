apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: auth-service
data:
  01-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    -- pg_uuidv7 not needed: PostgreSQL 17+ has native uuidv7() built-in
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: auth-service
data:
  POSTGRES_DB: auth_db
  POSTGRES_USER: postgres
  PGPORT: "5433"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: auth-service
type: Opaque
stringData:
  POSTGRES_PASSWORD: changeme_local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.3-alpine
          ports:
            - containerPort: 5433
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: auth-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5433
      targetPort: 5433