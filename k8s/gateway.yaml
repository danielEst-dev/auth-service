apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
    spec:
      containers:
        - name: auth-gateway
          image: auth-service/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ReverseProxy__Clusters__auth-grpc-cluster__Destinations__auth-grpc-primary__Address
              value: http://auth-grpc:5000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: auth-service
spec:
  type: NodePort
  selector:
    app: auth-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
