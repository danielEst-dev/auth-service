apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: auth-service
type: Opaque
stringData:
  REDIS_PASSWORD: changeme_local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.6.2-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: auth-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379